<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart City Weather Dashboard - Real-time weather, forecasts, and air quality data for any city worldwide.">
    <title>Smart City Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-background" class="app-background theme-default"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">⛅</span>
                <h1>Smart City Weather</h1>
            </div>
            <form id="search-form" class="search-bar">
                <div class="search-input-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="city-input" placeholder="Search any city..." autocomplete="off">
                </div>
                <button type="submit" id="search-btn">
                    <span class="btn-text">Search</span>
                    <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </header>

        <div id="loading-state" class="loading-state hidden">
            <div class="loader-ring">
                <div></div><div></div><div></div><div></div>
            </div>
            <p class="loading-text">Fetching weather data...</p>
        </div>

        <div id="error-state" class="error-state hidden">
            <div class="error-card">
                <span class="error-icon">⚠️</span>
                <h3 id="error-title">Something went wrong</h3>
                <p id="error-message">Please try again.</p>
                <button id="error-dismiss" class="dismiss-btn">Try Again</button>
            </div>
        </div>

        <main id="weather-content" class="weather-content hidden">
            <section class="current-weather-section">
                <div class="current-weather-card">
                    <div class="current-left">
                        <div class="city-info">
                            <h2 id="city-name">—</h2>
                            <p id="city-coords" class="coords-text"></p>
                        </div>
                        <div class="temperature-display">
                            <span id="current-temp" class="temp-value">—</span>
                            <span class="temp-unit">°C</span>
                        </div>
                        <p id="weather-condition" class="condition-text">—</p>
                    </div>
                    <div class="current-right">
                        <span id="weather-emoji" class="weather-emoji">🌤️</span>
                        <div class="detail-pills">
                            <div class="pill">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
                                </svg>
                                <span id="wind-speed">— km/h</span>
                            </div>
                            <div class="pill">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                                </svg>
                                <span id="humidity-val">—%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="forecast-section">
                <h3 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    5-Day Forecast
                </h3>
                <div id="forecast-grid" class="forecast-grid"></div>
            </section>

            <section class="air-quality-section">
                <h3 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 2h8l4 10H4L8 2z"/>
                        <path d="M12 12v6"/>
                        <path d="M8 22h8"/>
                        <path d="M12 18h.01"/>
                    </svg>
                    Air Quality Index
                </h3>
                <div class="aqi-grid">
                    <div class="aqi-card" id="aqi-pm25">
                        <div class="aqi-ring">
                            <svg viewBox="0 0 120 120">
                                <circle class="ring-bg" cx="60" cy="60" r="52"/>
                                <circle class="ring-fill pm25-ring" cx="60" cy="60" r="52"/>
                            </svg>
                            <span class="aqi-value" id="pm25-value">—</span>
                        </div>
                        <p class="aqi-label">PM2.5</p>
                        <p class="aqi-unit">μg/m³</p>
                        <span class="aqi-badge" id="pm25-badge">—</span>
                    </div>
                    <div class="aqi-card" id="aqi-pm10">
                        <div class="aqi-ring">
                            <svg viewBox="0 0 120 120">
                                <circle class="ring-bg" cx="60" cy="60" r="52"/>
                                <circle class="ring-fill pm10-ring" cx="60" cy="60" r="52"/>
                            </svg>
                            <span class="aqi-value" id="pm10-value">—</span>
                        </div>
                        <p class="aqi-label">PM10</p>
                        <p class="aqi-unit">μg/m³</p>
                        <span class="aqi-badge" id="pm10-badge">—</span>
                    </div>
                    <div class="aqi-card" id="aqi-co">
                        <div class="aqi-ring">
                            <svg viewBox="0 0 120 120">
                                <circle class="ring-bg" cx="60" cy="60" r="52"/>
                                <circle class="ring-fill co-ring" cx="60" cy="60" r="52"/>
                            </svg>
                            <span class="aqi-value" id="co-value">—</span>
                        </div>
                        <p class="aqi-label">CO</p>
                        <p class="aqi-unit">μg/m³</p>
                        <span class="aqi-badge" id="co-badge">—</span>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>Powered by <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> · Smart City Dashboard</p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
